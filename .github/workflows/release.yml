name: Release

# Publishes the library to npm and creates a GitHub Release when a version tag is pushed.
#
# Setup required before first use:
#   1. Add a repository secret `NPM_TOKEN` (an npm automation token with publish rights).
#   2. Bump the version in packages/react-native-edge-slm/package.json.
#   3. Tag and push: `git tag v0.1.0 && git push origin v0.1.0` (tag must match the package version).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.2.0). Must already exist and match the package version."
        required: true

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (see the publish step)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Quality gate — never publish a build that fails checks or leaks private identifiers.
      - name: Private-asset leak gate
        run: npm run lint:no-private-assets
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

      - name: Verify tag matches package version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          PKG=$(node -p "require('./packages/react-native-edge-slm/package.json').version")
          TAG="${INPUT_TAG#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG"; exit 1
          fi

      # Publishes packages/react-native-edge-slm. Requires the NPM_TOKEN secret.
      # Once this repo is public, append `--provenance` for a supply-chain attestation.
      - name: Publish to npm
        run: npm publish --workspace packages/react-native-edge-slm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${INPUT_TAG}" --title "${INPUT_TAG}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
